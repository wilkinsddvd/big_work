<!-- 表格管理相关弹框界面 -->

<!-- 添加表格的弹框 -->
<div class="modal fade" id="addTableModal" tabindex="-1" aria-labelledby="addTableModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addUserModalLabel">新增表格</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addTableForm" class="container">
                    <div class="row mb-3">
                        <div class="mb-3">
                            <label class="form-label">表格信息</label>
                        </div>

                        <!-- 标签和输入框同一行 -->
                        <div class="d-flex align-items-center">
                            <label for="tableNameAdd" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">表格名称：</label>
                            <input type="text" id="tableNameAdd" name="tableName" class="form-control" style="min-width: 300px;" placeholder="按照数据库表格名称规则校验" required>
                            <label for="tableDescAdd" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">表格描述：</label>
                            <input type="text" id="tableDescAdd" name="tableDesc" class="form-control" style="min-width: 300px;" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">列信息</label>
                        </div>

                        <div class="mb-3">
                            <button class="btn btn-success" type="button" id="add-column" onclick="addColumn()">添加列</button>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted">下拉框可选项：以英文逗号分隔，默认选中第一个。</small>
                        </div>

                        <div class="mb-3 overflow-auto" style="max-height: 200px;" id="columns-container">
                            <!-- Dynamic column rows will be appended here -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button id="saveUserButton" type="button" class="btn btn-primary" onclick="saveTable()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 修改用户的弹框 -->
<div class="modal fade" id="modifyTableModal" tabindex="-1" aria-labelledby="modifyTableModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modifyUserModalLabel">修改表格</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="modifyTableForm" class="container">
                    <div class="row mb-3">
                        <div class="mb-3">
                            <label class="form-label">表格信息</label>
                        </div>

                        <!-- 标签和输入框同一行 -->
                        <div class="d-flex align-items-center">
                            <label for="tableNameModify" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">表格名称：</label>
                            <input type="text" id="tableNameModify" name="tableName" class="form-control" style="min-width: 300px;" placeholder="按照数据库表格名称规则校验" required>
                            <label for="tableDescModify" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">表格描述：</label>
                            <input type="text" id="tableDescModify" name="tableDesc" class="form-control" style="min-width: 300px;" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button id="modifyTableButton" type="button" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>
</div>
