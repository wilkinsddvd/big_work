<!-- 用户管理相关弹框界面 -->

<!-- 添加用户的弹框 -->
<div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addUserModalLabel">新增用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addUserForm" class="container">
                    <div class="row mb-3">
                        <div class="col-md-6 d-flex flex-column">
                            <!-- 标签和输入框同一行 -->
                            <div class="d-flex align-items-center">
                                <label for="usernameAdd" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">用户名 <span style="color: red;">*</span></label>
                                <input type="text" id="usernameAdd" name="userName" class="form-control" style="min-width: 300px;" required>
                            </div>
                            <!-- 错误信息与输入框对齐 -->
                            <!-- 通过设置 margin-left: 100px; 来使错误信息与输入框对齐, 这个值应该与 label 的 min-width 对应（即100px） -->
                            <div id="usernameAddError" class="error text-nowrap"  style="margin-top: 5px; margin-left: 100px; height: 20px; line-height: 20px;"></div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6 d-flex flex-column">
                            <!-- 角色 -->
                            <div class="d-flex align-items-center">
                                <label for="roleAdd" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">角色 <span style="color: red;">*</span></label>
                                <select id="roleAdd" name="role" class="form-control" style="min-width: 300px;" required>
                                    <option value="2" selected>普通用户</option>
                                    <option value="1">系统管理员</option>
                                </select>
                            </div>
                            <div class="error text-nowrap" style="margin-top: 5px; margin-left: 100px; height: 20px; line-height: 20px;"></div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6 d-flex flex-column">
                            <!-- 密码 -->
                            <div class="d-flex align-items-center">
                                <label for="passwordAdd" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">密码 <span style="color: red;">*</span></label>
                                <input type="password" id="passwordAdd" name="password" class="form-control" style="min-width: 300px;" required>
                            </div>
                            <div id="passwordAddError" class="error text-nowrap" style="margin-top: 5px; margin-left: 100px; height: 20px; line-height: 20px;"></div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6 d-flex flex-column">
                            <!-- 确认密码 -->
                            <div class="d-flex align-items-center">
                                <label for="confirmPasswordAdd" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">确认密码 <span style="color: red;">*</span></label>
                                <input type="password" id="confirmPasswordAdd" name="confirmPassword" class="form-control" style="min-width: 300px;" required>
                            </div>
                            <div id="confirmPasswordAddError" class="error text-nowrap" style="margin-top: 5px; margin-left: 100px; height: 20px; line-height: 20px;"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button id="saveUserButton" type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 修改用户的弹框 -->
<div class="modal fade" id="modifyUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modifyUserModalLabel">修改用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="modifyUserForm" class="container">
                    <div class="row mb-3">
                        <div class="col-md-6 d-flex flex-column">
                            <!-- 标签和输入框同一行 -->
                            <div class="d-flex align-items-center">
                                <label for="usernameAdd" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">用户名 <span style="color: red;">*</span></label>
                                <input type="text" id="usernameModify" name="userName" class="form-control" style="min-width: 300px;" disabled>
                            </div>
                            <!-- 错误信息与输入框对齐 -->
                            <!-- 通过设置 margin-left: 100px; 来使错误信息与输入框对齐, 这个值应该与 label 的 min-width 对应（即100px） -->
                            <div id="usernameModifyError" class="error text-nowrap"  style="margin-top: 5px; margin-left: 100px; height: 20px; line-height: 20px;"></div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6 d-flex flex-column">
                            <!-- 用户角色 -->
                            <div class="d-flex align-items-center">
                                <label for="roleModify" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">用户角色 <span style="color: red;">*</span></label>
                                <select id="roleModify" name="role" class="form-control" style="min-width: 300px;" required>
                                    <option value="2" selected>普通用户</option>
                                    <option value="1">系统管理员</option>
                                </select>
                            </div>
                            <div class="error text-nowrap" style="margin-top: 5px; margin-left: 100px; height: 20px; line-height: 20px;"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button id="modifyUserButton" type="button" class="btn btn-primary" onclick="modifyUser()">保存</button>
            </div>
        </div>
    </div>
</div>
<!-- 批量修改的弹框 -->
<div class="modal fade" id="batchModifyModalForUser" tabindex="-1" aria-labelledby="batchModifyModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="batchModifyModalLabelForUser">批量修改</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="batchModifyFormForUser">

                    <div class="row mb-3">
                        <div class="col-md-6 d-flex flex-column">
                            <!-- 角色 -->
                            <div class="d-flex align-items-center">
                                <label for="roleBatchModify" class="form-label mb-0 me-2 text-nowrap" style="min-width: 100px; text-align: right; display: block;">角色 <span style="color: red;">*</span></label>
                                <select id="roleBatchModify" name="role" class="form-control" style="min-width: 300px;" required>
                                    <option value="2" selected>普通用户</option>
                                    <option value="1">系统管理员</option>
                                </select>
                            </div>
                            <div class="error text-nowrap" style="margin-top: 5px; margin-left: 100px; height: 20px; line-height: 20px;"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="batchModifyForUser()">确认修改</button>
            </div>
        </div>
    </div>
</div>
<!-- 修改用户的弹框 -->
<div class="modal fade" id="resetPwdModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="resetPwdModalLabel">重置密码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>

            <div class="modal-body">
                <form id="resetPwdForm" class="container">

                        <div class="col-md-6 d-flex flex-column">

                            <div class="d-flex align-items-center">

                                <input type="password" id="confirmPasswordReset" name="confirmPassword" class="form-control" style="min-width: 300px;" required>

                <button id="resetPwdButton" type="button" class="btn btn-primary" onclick="resetPwd()">保存</button>
            </div>
        </div>
    </div>
</div>
